<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="780" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0f1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="termBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#0d1321"/>
    </linearGradient>
    <linearGradient id="glowAmber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glowBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="780" height="400" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.04">
    <line x1="0" y1="40" x2="780" y2="40" stroke="#94a3b8" stroke-width="0.5"/>
    <line x1="0" y1="80" x2="780" y2="80" stroke="#94a3b8" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="780" y2="120" stroke="#94a3b8" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="780" y2="160" stroke="#94a3b8" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="780" y2="200" stroke="#94a3b8" stroke-width="0.5"/>
    <line x1="0" y1="240" x2="780" y2="240" stroke="#94a3b8" stroke-width="0.5"/>
    <line x1="0" y1="280" x2="780" y2="280" stroke="#94a3b8" stroke-width="0.5"/>
    <line x1="0" y1="320" x2="780" y2="320" stroke="#94a3b8" stroke-width="0.5"/>
    <line x1="0" y1="360" x2="780" y2="360" stroke="#94a3b8" stroke-width="0.5"/>
    <line x1="40" y1="0" x2="40" y2="400" stroke="#94a3b8" stroke-width="0.5"/>
    <line x1="130" y1="0" x2="130" y2="400" stroke="#94a3b8" stroke-width="0.5"/>
    <line x1="220" y1="0" x2="220" y2="400" stroke="#94a3b8" stroke-width="0.5"/>
    <line x1="310" y1="0" x2="310" y2="400" stroke="#94a3b8" stroke-width="0.5"/>
    <line x1="390" y1="0" x2="390" y2="400" stroke="#94a3b8" stroke-width="0.5"/>
    <line x1="470" y1="0" x2="470" y2="400" stroke="#94a3b8" stroke-width="0.5"/>
    <line x1="560" y1="0" x2="560" y2="400" stroke="#94a3b8" stroke-width="0.5"/>
    <line x1="650" y1="0" x2="650" y2="400" stroke="#94a3b8" stroke-width="0.5"/>
    <line x1="740" y1="0" x2="740" y2="400" stroke="#94a3b8" stroke-width="0.5"/>
  </g>

  <!-- Ambient glow behind terminal -->
  <ellipse cx="280" cy="220" rx="220" ry="160" fill="url(#glowAmber)" opacity="0.6"/>
  <ellipse cx="550" cy="180" rx="180" ry="140" fill="url(#glowBlue)" opacity="0.4"/>

  <!-- Terminal window -->
  <rect x="60" y="55" width="420" height="290" rx="10" fill="url(#termBg)" stroke="#1e293b" stroke-width="1.5"/>

  <!-- Terminal title bar -->
  <rect x="60" y="55" width="420" height="32" rx="10" fill="#1a2234"/>
  <rect x="60" y="77" width="420" height="10" fill="#1a2234"/>
  <circle cx="80" cy="71" r="5" fill="#ef4444" opacity="0.9"/>
  <circle cx="96" cy="71" r="5" fill="#eab308" opacity="0.9"/>
  <circle cx="112" cy="71" r="5" fill="#22c55e" opacity="0.9"/>
  <text x="270" y="75" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#6b7280" text-anchor="middle" xml:space="preserve">src/constants/prompts.ts</text>

  <!-- Code lines -->
  <g font-family="'SF Mono', 'Fira Code', monospace" font-size="11">
    <!-- Line numbers -->
    <text x="75" y="110" fill="#374151">1</text>
    <text x="75" y="128" fill="#374151">2</text>
    <text x="75" y="146" fill="#374151">3</text>
    <text x="75" y="164" fill="#374151">4</text>
    <text x="75" y="182" fill="#374151">5</text>
    <text x="75" y="200" fill="#374151">6</text>
    <text x="75" y="218" fill="#374151">7</text>
    <text x="75" y="236" fill="#374151">8</text>
    <text x="75" y="254" fill="#374151">9</text>
    <text x="69" y="272" fill="#374151">10</text>
    <text x="69" y="290" fill="#374151">11</text>
    <text x="69" y="308" fill="#374151">12</text>
    <text x="69" y="326" fill="#374151">13</text>

    <!-- Code content -->
    <text x="95" y="110" fill="#c084fc">function</text>
    <text x="157" y="110" fill="#67e8f9">getSystemPrompt</text>
    <text x="273" y="110" fill="#e2e8f0">() {</text>

    <text x="95" y="128" fill="#6b7280">  // 15+ sections assembled</text>

    <text x="95" y="146" fill="#c084fc">  return</text>
    <text x="138" y="146" fill="#e2e8f0">[</text>

    <text x="95" y="164" fill="#67e8f9">    getIdentitySection</text>
    <text x="255" y="164" fill="#e2e8f0">(),</text>

    <text x="95" y="182" fill="#67e8f9">    getSecurityGuardrails</text>
    <text x="268" y="182" fill="#e2e8f0">(),</text>

    <text x="95" y="200" fill="#67e8f9">    getToolUsageSection</text>
    <text x="262" y="200" fill="#e2e8f0">(),</text>

    <!-- Highlighted line - CLAUDE.md -->
    <rect x="61" y="209" width="418" height="18" fill="#f59e0b" opacity="0.08"/>
    <rect x="61" y="209" width="3" height="18" fill="#f59e0b" opacity="0.7"/>
    <text x="95" y="222" fill="#f59e0b" font-weight="600">    loadMemoryPrompt</text>
    <text x="252" y="222" fill="#e2e8f0">(),</text>
    <text x="282" y="222" fill="#6b7280">// CLAUDE.md</text>

    <text x="95" y="240" fill="#67e8f9">    computeEnvInfo</text>
    <text x="228" y="240" fill="#e2e8f0">(),</text>

    <text x="95" y="258" fill="#67e8f9">    getMcpInstructions</text>
    <text x="255" y="258" fill="#e2e8f0">(),</text>

    <text x="95" y="276" fill="#e2e8f0">  ];</text>

    <text x="95" y="294" fill="#e2e8f0">}</text>

    <text x="95" y="312" fill="#6b7280">// CACHE BOUNDARY between</text>
    <text x="95" y="330" fill="#6b7280">// static and dynamic sections</text>
  </g>

  <!-- Right side: title and stats -->
  <g transform="translate(520, 90)">
    <!-- Title -->
    <text x="0" y="0" font-family="'Inter', -apple-system, sans-serif" font-size="14" font-weight="600" fill="#f59e0b" letter-spacing="2" xml:space="preserve">LEAKED SOURCE</text>
    <text x="0" y="36" font-family="'Inter', -apple-system, sans-serif" font-size="28" font-weight="700" fill="#f3f4f6" xml:space="preserve">Claude</text>
    <text x="0" y="68" font-family="'Inter', -apple-system, sans-serif" font-size="28" font-weight="700" fill="#f3f4f6" xml:space="preserve">Code</text>

    <!-- Divider -->
    <line x1="0" y1="85" x2="180" y2="85" stroke="#f59e0b" stroke-width="2" opacity="0.5"/>

    <!-- Stats -->
    <text x="0" y="115" font-family="'SF Mono', 'Fira Code', monospace" font-size="22" font-weight="700" fill="#3b82f6">1,900+</text>
    <text x="110" y="115" font-family="'Inter', sans-serif" font-size="11" fill="#6b7280" xml:space="preserve">TS files</text>

    <text x="0" y="145" font-family="'SF Mono', 'Fira Code', monospace" font-size="22" font-weight="700" fill="#22c55e">90+</text>
    <text x="60" y="145" font-family="'Inter', sans-serif" font-size="11" fill="#6b7280" xml:space="preserve">slash commands</text>

    <text x="0" y="175" font-family="'SF Mono', 'Fira Code', monospace" font-size="22" font-weight="700" fill="#f59e0b">15+</text>
    <text x="55" y="175" font-family="'Inter', sans-serif" font-size="11" fill="#6b7280" xml:space="preserve">prompt sections</text>

    <text x="0" y="205" font-family="'SF Mono', 'Fira Code', monospace" font-size="22" font-weight="700" fill="#ef4444">7</text>
    <text x="25" y="205" font-family="'Inter', sans-serif" font-size="11" fill="#6b7280" xml:space="preserve">security layers</text>
  </g>

  <!-- Magnifying glass over terminal -->
  <g filter="url(#glow)" opacity="0.7">
    <circle cx="430" cy="140" r="30" fill="none" stroke="#f59e0b" stroke-width="2.5"/>
    <line x1="451" y1="161" x2="468" y2="178" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Floating badge -->
  <rect x="520" y="315" width="200" height="30" rx="15" fill="#f59e0b" opacity="0.12" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.3"/>
  <text x="620" y="334" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" font-weight="600" fill="#f59e0b" text-anchor="middle" xml:space="preserve">REVERSE ENGINEERED</text>
</svg>
